<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人工智能训练师职业技能等级认定准考证查询系统</title>
    <!-- 引入SheetJS库，用于前端读取Excel文件 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 30px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1f4e79;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 15px;
            color: #333;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #409eff;
            box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.2);
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            background-color: #1f4e79;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            background-color: #2a659f;
        }

        .submit-btn:disabled {
            background-color: #909399;
            cursor: not-allowed;
        }

        .result-card {
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
        }

        .result-success {
            background-color: #f0f9ff;
            border: 1px solid #b3d8ff;
            display: block;
        }

        .result-error {
            background-color: #fef0f0;
            border: 1px solid #fbc4c4;
            display: block;
        }

        .result-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .result-content {
            font-size: 18px;
            font-weight: 600;
            word-break: break-all;
        }

        .success-title {
            color: #1f4e79;
        }

        .success-content {
            color: #1f4e79;
        }

        .error-title {
            color: #f56c6c;
        }

        .error-content {
            color: #f56c6c;
            font-size: 15px;
            font-weight: 400;
        }

        .loading-tip {
            text-align: center;
            color: #909399;
            font-size: 14px;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #909399;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>人工智能训练师职业技能等级认定</h1>
            <h1>准考证号码查询系统</h1>
            <p>请输入考生姓名和证件号码，查询您的准考证信息</p>
        </div>

        <div class="form-group">
            <label for="name">考生姓名 *</label>
            <input type="text" id="name" placeholder="请输入您的真实姓名">
        </div>

        <div class="form-group">
            <label for="idCard">证件号码 *</label>
            <input type="text" id="idCard" placeholder="请输入您的身份证/证件号码">
        </div>

        <button class="submit-btn" id="submitBtn" disabled>数据加载中，请稍候...</button>

        <div class="loading-tip" id="loadingTip">正在读取考生数据文件...</div>

        <div class="result-card" id="resultCard"></div>

        <div class="footer">
            <p>本系统仅用于本地准考证信息查询，数据全程不上传服务器</p>
            <p>人工智能训练师职业技能等级认定考试 技术支持</p>
        </div>
    </div>

    <script>
        // 全局变量，存储解析后的考生数据
        let examData = [];
        const submitBtn = document.getElementById('submitBtn');
        const loadingTip = document.getElementById('loadingTip');
        const resultCard = document.getElementById('resultCard');

        // 页面加载完成后，自动读取同目录的Excel文件
        window.onload = function() {
            readExcelFile();
        };

        // 读取Excel文件函数
        function readExcelFile() {
            // 同目录下的Excel文件名，与您上传的文件完全一致
            const excelFilePath = '准考证导出-20260527.xlsx';
            
            // 通过fetch读取文件
            fetch(excelFilePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件读取失败，请确保HTML文件与Excel文件在同一目录下，且文件名正确');
                    }
                    return response.arrayBuffer();
                })
                .then(data => {
                    // 解析Excel文件
                    const workbook = XLSX.read(data, { type: 'array' });
                    // 读取第一个Sheet的数据
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    // 转换为JSON数组
                    examData = XLSX.utils.sheet_to_json(worksheet);
                    
                    // 校验数据是否包含目标列
                    if (examData.length > 0) {
                        const firstRow = examData[0];
                        if (!firstRow['准考证号码'] || !firstRow['考生姓名'] || !firstRow['证件号码']) {
                            throw new Error('Excel文件中缺少必要的列，请确保包含「准考证号码」「考生姓名」「证件号码」三列');
                        }
                    }

                    // 加载完成，启用按钮
                    submitBtn.disabled = false;
                    submitBtn.innerText = '点击查询准考证号码';
                    loadingTip.innerText = `数据加载完成，共加载 ${examData.length} 条考生记录`;
                })
                .catch(error => {
                    loadingTip.innerText = error.message;
                    submitBtn.innerText = '数据加载失败';
                    resultCard.className = 'result-card result-error';
                    resultCard.innerHTML = `
                        <div class="result-title error-title">加载失败</div>
                        <div class="result-content error-content">${error.message}</div>
                    `;
                });
        }

        // 绑定提交按钮点击事件
        submitBtn.addEventListener('click', function() {
            // 获取输入值
            const name = document.getElementById('name').value.trim();
            const idCard = document.getElementById('idCard').value.trim();

            // 输入校验
            if (!name || !idCard) {
                resultCard.className = 'result-card result-error';
                resultCard.innerHTML = `
                    <div class="result-title error-title">输入不完整</div>
                    <div class="result-content error-content">请填写完整的考生姓名和证件号码</div>
                `;
                return;
            }

            // 匹配数据：姓名和证件号码完全匹配
            const matchedRecords = examData.filter(item => {
                return item['考生姓名']?.trim() === name && item['证件号码']?.trim() === idCard;
            });

            // 处理匹配结果
            if (matchedRecords.length === 0) {
                resultCard.className = 'result-card result-error';
                resultCard.innerHTML = `
                    <div class="result-title error-title">未找到匹配记录</div>
                    <div class="result-content error-content">请确认您输入的考生姓名和证件号码是否正确，与报名时填写的信息完全一致</div>
                `;
            } else if (matchedRecords.length === 1) {
                const ticketNumber = matchedRecords[0]['准考证号码'];
                resultCard.className = 'result-card result-success';
                resultCard.innerHTML = `
                    <div class="result-title success-title">查询成功，您的准考证号码为：</div>
                    <div class="result-content success-content">${ticketNumber}</div>
                `;
            } else {
                // 多条匹配记录的情况
                const ticketNumbers = matchedRecords.map(item => item['准考证号码']).join('、');
                resultCard.className = 'result-card result-success';
                resultCard.innerHTML = `
                    <div class="result-title success-title">查询成功，匹配到多条记录，准考证号码为：</div>
                    <div class="result-content success-content">${ticketNumbers}</div>
                `;
            }
        });

        // 绑定回车键提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !submitBtn.disabled) {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
